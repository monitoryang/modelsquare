services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: modelsquare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-modelsquare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "10001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Stream
  redis:
    image: redis:7-alpine
    container_name: modelsquare-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "10002:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: modelsquare-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "10003:9000"
      - "10004:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://172.16.20.33:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # SRS Streaming Server
  srs:
    image: ossrs/srs:v6.0.155
    container_name: modelsquare-srs
    restart: unless-stopped
    command: ./objs/srs -c conf/srs.conf
    volumes:
      - ./docker/srs/srs.conf:/usr/local/srs/conf/srs.conf
    ports:
      - "10005:1935"      # RTMP
      - "10006:1985"      # HTTP API
      - "10007:8080"      # HTTP Server (HLS/FLV)
      - "10008:8000/udp"  # WebRTC
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1985'"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: modelsquare-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-modelsquare}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-172.16.20.33:10003}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - TRITON_URL=triton:8001
      - TRITON_MODEL_REPOSITORY=/models
      - VLLM_URL=http://vllm-vl:8000
      - VLLM_MODEL_NAME=${VLLM_MODEL_NAME:-qwen3-vl}
      - SRS_RTMP_URL=rtmp://srs:1935/live
      - SRS_HTTP_URL=http://srs:8080
      - SRS_RTMP_PUBLIC_URL=${SRS_RTMP_PUBLIC_URL:-rtmp://172.16.20.33:1945/live}
      - SRS_HTTP_PUBLIC_URL=${SRS_HTTP_PUBLIC_URL:-http://172.16.20.33:8090}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://172.16.20.33:5173","http://172.16.20.33:3010"]}
      - DEBUG=${DEBUG:-false}
      # GPU acceleration settings for FFmpeg
      - USE_GPU=${USE_GPU:-true}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    volumes:
      - ./backend:/app
      - ./models:/models
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "10010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://172.16.20.33:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Enable NVIDIA GPU access for GPU monitoring (NVML) and video encoding/decoding (NVENC/NVDEC)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [utility, video, compute]

  # React Frontend
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://172.16.20.33:8020}
        - VITE_SRS_HTTP_URL=${VITE_SRS_HTTP_URL:-http://172.16.20.33:8090}
    container_name: modelsquare-web
    restart: unless-stopped
    ports:
      - "10011:80"
    depends_on:
      - api

  # NVIDIA Triton Inference Server
  triton:
    image: nvcr.io/nvidia/tritonserver:25.04-py3
    container_name: modelsquare-triton
    restart: unless-stopped
    command: tritonserver --model-repository=/models --strict-model-config=false --model-control-mode=explicit
    volumes:
      - ./models:/models
    ports:
      - "10020:8001"   # gRPC
      - "10021:8002"   # HTTP
      - "10022:8003"   # Metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu  # Only start with --profile gpu

  # vLLM OpenAI-Compatible Server for Multimodal LLM
  vllm-vl:
    build:
      context: ./vllm
      dockerfile: Dockerfile
    image: modelsquare-vllm:v0.13.0
    container_name: modelsquare-vllm
    restart: unless-stopped
    ipc: host
    environment:
      - VLLM_USE_MODELSCOPE=True
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
    command: >
      /models/Qwen3-VL-32B-Instruct
      --served-model-name qwen3-vl
      --tensor-parallel-size 2
      --gpu-memory-utilization 0.85
      --max-model-len 32768
      --trust-remote-code
      --dtype bfloat16
      --limit-mm-per-prompt '{"image": 4}'
      --max-num-seqs 8
    volumes:
      - ./llm_models:/models:ro
    ports:
      - "10030:8000"   # vLLM OpenAI API
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - vllm-vl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://172.16.20.33:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
  # vLLM OpenAI-Compatible Server (Qwen3-VL-8B, single GPU)
  vllm-vl-8b:
    build:
      context: ./vllm
      dockerfile: Dockerfile
    image: modelsquare-vllm:v0.13.0
    container_name: modelsquare-vllm-8b
    restart: unless-stopped
    ipc: host
    environment:
      - VLLM_USE_MODELSCOPE=True
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
    command: >
      /models/Qwen3-VL-8B-Instruct
      --served-model-name qwen3-vl-8b
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.85
      --max-model-len 32768
      --trust-remote-code
      --dtype bfloat16
      --limit-mm-per-prompt '{"image": 4}'
      --max-num-seqs 8
    volumes:
      - ./llm_models:/models:ro
    ports:
      - "10032:8000"   # vLLM OpenAI API (8B)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - vllm-vl-8b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://172.16.20.33:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # vLLM OpenAI-Compatible Server (Qwen3-VL-4B, single GPU)
  vllm-vl-4b:
    build:
      context: ./vllm
      dockerfile: Dockerfile
    image: modelsquare-vllm:v0.13.0
    container_name: modelsquare-vllm-4b
    restart: unless-stopped
    ipc: host
    environment:
      - VLLM_USE_MODELSCOPE=True
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
    command: >
      /models/Qwen3-VL-4B-Instruct
      --served-model-name qwen3-vl-4b
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.85
      --max-model-len 32768
      --trust-remote-code
      --dtype bfloat16
      --limit-mm-per-prompt '{"image": 4}'
      --max-num-seqs 8
    volumes:
      - ./llm_models:/models:ro
    ports:
      - "10033:8000"   # vLLM OpenAI API (4B)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - vllm-vl-4b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://172.16.20.33:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # vLLM OpenAI-Compatible Server (Qwen3-Omni)
  vllm-omni:
    build:
      context: ./vllm
      dockerfile: Dockerfile
    image: modelsquare-vllm:qwen3-omni
    container_name: modelsquare-vllm-omni
    restart: unless-stopped
    ipc: host

    environment:
      - VLLM_USE_MODELSCOPE=True
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
      - NVIDIA_VISIBLE_DEVICES=all

    command: >
      /models/Qwen3-Omni-30B-A3B-Instruct
      --served-model-name qwen3-omni
      --tensor-parallel-size 2
      --gpu-memory-utilization 0.9
      --max-model-len 32768
      --trust-remote-code
      --dtype bfloat16
      --limit-mm-per-prompt '{"image":4,"audio":2,"video":1}'
      --max-num-seqs 6
      --enable-chunked-prefill

    volumes:
      - ./llm_models:/models:ro

    ports:
      - "10031:8000"   # Omni 单独端口

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://172.16.20.33:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

    profiles:
      - vllm
      - vllm-omni

  # FFmpeg Worker (Frame Extraction) with NVIDIA GPU Hardware Acceleration
  ffmpeg-worker:
    build:
      context: ./docker
      dockerfile: ffmpeg/Dockerfile
    container_name: modelsquare-ffmpeg
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SRS_RTMP_URL=rtmp://srs:1935/live
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
    depends_on:
      redis:
        condition: service_healthy
      srs:
        condition: service_healthy
    profiles:
      - workers  # Only start with --profile workers

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: modelsquare-network
