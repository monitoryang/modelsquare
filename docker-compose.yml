services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: modelsquare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-modelsquare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Stream
  redis:
    image: redis:7-alpine
    container_name: modelsquare-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: modelsquare-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9010:9000"
      - "9011:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # SRS Streaming Server
  srs:
    image: ossrs/srs:v6.0.155
    container_name: modelsquare-srs
    restart: unless-stopped
    volumes:
      - ./docker/srs/srs.conf:/usr/local/srs/conf/srs.conf
    ports:
      - "1945:1935"      # RTMP
      - "1995:1985"      # HTTP API
      - "8090:8080"      # HTTP Server (HLS/FLV)
      - "8015:8000/udp"  # WebRTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1985/api/v1/versions"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modelsquare-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-modelsquare}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=localhost:9010
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - TRITON_URL=triton:8001
      - TRITON_MODEL_REPOSITORY=/models
      - VLLM_URL=http://vllm:8000
      - VLLM_MODEL_NAME=${VLLM_MODEL_NAME:-qwen3-vl}
      - SRS_RTMP_URL=rtmp://srs:1935/live
      - SRS_HTTP_URL=http://srs:8080
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./backend:/app
      - ./models:/models
    ports:
      - "8020:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Enable NVIDIA GPU access for GPU monitoring (NVML)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [utility]  # Only need utility for NVML, not compute

  # React Frontend
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: modelsquare-web
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8020
      - VITE_SRS_HTTP_URL=http://localhost:8090
    ports:
      - "3010:80"
    depends_on:
      - api

  # NVIDIA Triton Inference Server
  triton:
    image: nvcr.io/nvidia/tritonserver:25.04-py3
    container_name: modelsquare-triton
    restart: unless-stopped
    command: tritonserver --model-repository=/models --strict-model-config=false
    volumes:
      - ./models:/models
    ports:
      - "8021:8001"   # gRPC
      - "8022:8002"   # HTTP
      - "8023:8003"   # Metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu  # Only start with --profile gpu

  # vLLM OpenAI-Compatible Server for Multimodal LLM
  vllm:
    build:
      context: ./vllm
      dockerfile: Dockerfile
    image: modelsquare-vllm:v0.13.0
    container_name: modelsquare-vllm
    restart: unless-stopped
    ipc: host
    environment:
      - VLLM_USE_MODELSCOPE=True
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
    command: >
      /models/Qwen3-VL-32B-Instruct
      --served-model-name qwen3-vl
      --tensor-parallel-size 2
      --gpu-memory-utilization 0.85
      --max-model-len 32768
      --trust-remote-code
      --dtype bfloat16
      --limit-mm-per-prompt '{"image": 4}'
      --max-num-seqs 8
    volumes:
      - ./llm_models:/models:ro
    ports:
      - "8110:8000"   # vLLM OpenAI API
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - vllm  # Only start with --profile vllm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # FFmpeg Worker (Frame Extraction)
  ffmpeg-worker:
    build:
      context: ./docker/ffmpeg
      dockerfile: Dockerfile
    container_name: modelsquare-ffmpeg
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SRS_RTMP_URL=rtmp://srs:1935/live
    depends_on:
      redis:
        condition: service_healthy
      srs:
        condition: service_healthy
    profiles:
      - workers  # Only start with --profile workers

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: modelsquare-network
