# SRS Configuration for ModelSquare
# https://ossrs.io/lts/en-us/docs/v6/doc/getting-started

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       *;
}

vhost __defaultVhost__ {
    # Enable HLS
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    # Enable HTTP-FLV
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # Enable WebRTC
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }

    # DVR recording (optional)
    dvr {
        enabled         off;
        dvr_path        ./objs/nginx/html/[app]/[stream].[timestamp].flv;
        dvr_plan        session;
    }

    # Transcoding hooks for frame extraction
    http_hooks {
        enabled         on;
        on_publish      http://ffmpeg-worker:8080/api/hooks/on_publish;
        on_unpublish    http://ffmpeg-worker:8080/api/hooks/on_unpublish;
    }
}
